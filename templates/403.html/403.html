<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DineSync — Access Denied</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #f5f0e8; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .container { max-width: 400px; padding: 2rem; }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #e05c3a; margin-bottom: 1rem; }
    p { color: #888; font-size: 1rem; line-height: 1.7; margin-bottom: 2rem; }
    a { background: #c9a84c; color: #000; padding: 0.8rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 700; transition: all 0.2s; }
    a:hover { background: #e8c97a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>
    <h1>Access Denied</h1>
    <p>You don't have permission to access this page. Please log in with the correct role.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
